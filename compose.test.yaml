services:
  db:
    # No volume: test data is ephemeral and reset on each compose-down
    image: docker.io/library/postgres:18-alpine
    container_name: netforum-db-test
    environment:
      POSTGRES_DB: netforum_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d netforum_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    # No volume: test uploads are ephemeral and reset on each compose-down
    image: docker.io/minio/minio:latest
    container_name: netforum-minio-test
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Create the default bucket automatically on first run
  minio-init:
    image: docker.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/netforum;
      mc anonymous set download local/netforum;
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netforum-app-test
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=netforum_db;Username=postgres;Password=postgres
      - Storage__Endpoint=minio:9000
      - Storage__AccessKey=minioadmin
      - Storage__SecretKey=minioadmin
      - Storage__BucketName=netforum
      - Storage__PublicUrl=http://localhost:9002
      # Dummy values for local testing — Google OAuth sign-in will error here
      - Authentication__Google__ClientId=dummy-client-id
      - Authentication__Google__ClientSecret=dummy-client-secret
    ports:
      - "5202:8080"
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
