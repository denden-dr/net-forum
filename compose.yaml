services:
  db:
    image: docker.io/library/postgres:18-alpine
    container_name: netforum-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: netforum_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d netforum_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: docker.io/minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: netforum-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Create the default bucket automatically on first run
  minio-init:
    image: docker.io/minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/netforum;
      mc anonymous set download local/netforum;
      "

volumes:
  pgdata:
  miniodata:
